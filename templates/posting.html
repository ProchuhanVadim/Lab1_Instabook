<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-post { background: #6f42c1; color: white; padding: 8px 25px; }
        .card { border-radius: 12px; border: 1px solid #dbdbdb; padding: 25px; }
        .form-control { border-color: #28a745; }
    </style>
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 700px;">
        <div class="card shadow-sm bg-white">
            <form method="POST">
                <input name="title" class="form-control mb-3 fs-4" placeholder="Напишіть тему..." required>
                <textarea name="content" class="form-control mb-4" rows="8" placeholder="Про що ви зараз думаєте?" required></textarea>
                <div class="text-end">
                    <a href="/" class="btn btn-outline-secondary me-2">Скасувати</a>
                    <button class="btn btn-post shadow-sm">Опублікувати</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
