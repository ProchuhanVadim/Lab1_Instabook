<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 500px;">
        <div class="card p-4 shadow-sm border-0">
            <h2 class="text-center mb-4" style="color: #6f42c1;">Instabook Профіль</h2>
            <form method="POST">
                <div class="row mb-3">
                    <div class="col"><label class="small text-muted">Ім'я</label><input name="first_name" value="{{user.first_name}}" class="form-control"></div>
                    <div class="col"><label class="small text-muted">Прізвище</label><input name="last_name" value="{{user.last_name}}" class="form-control"></div>
                </div>
                <div class="mb-3">
                    <label class="small text-muted">Стать</label>
                    <select name="gender" class="form-select">
                        <option {% if user.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option {% if user.gender == 'Female' %}selected{% endif %}>Female</option>
                    </select>
                </div>
                <div class="mb-3"><label class="small text-muted">Дата народження</label><input name="birthday" value="{{user.birthday}}" class="form-control" type="text" placeholder="01.01.2000"></div>
                <div class="mb-4"><label class="small text-muted">Адреса</label><input name="address" value="{{user.address}}" class="form-control" placeholder="Ваше місто"></div>
                
                <button class="btn btn-primary w-100 py-2" style="background: #6f42c1; border: none;">Зберегти зміни</button>
                <a href="/" class="d-block text-center mt-3 text-secondary text-decoration-none small">← На головну</a>
            </form>
        </div>
    </div>
</body>
</html>
