<!DOCTYPE html>
<html>
<head>
    <title>Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow-sm" style="width: 350px; border-radius: 10px; border: none;">
        <h1 class="text-center fw-bold mb-4" style="color: #6f42c1;">Instabook</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger text-center py-2">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Пароль" required>
            <button class="btn btn-primary w-100" style="background: #6f42c1; border: none;">Увійти</button>
        </form>

        <div class="text-center mt-3 small">
            <a href="/forgot-password" style="color: #6f42c1; text-decoration: none;" class="fw-bold">
        Забули пароль?
             </a>
        </div>

        <div class="text-center mt-3 small">
            Немає акаунту?
            <a href="/signup" style="color: #6f42c1; text-decoration: none;" class="fw-bold">
                Зареєструватися
            </a>
        </div>
    </div>
</body>
</html>
