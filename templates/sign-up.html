<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> .logo { color: #6f42c1; font-weight: bold; font-size: 40px; margin-bottom: 20px; } </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="text-center" style="width: 350px;">
        <div class="logo">Instabook</div>
        <div class="card p-4 shadow-sm">
            <h4 class="mb-4">Реєстрація</h4>
            <form method="POST">
                <input name="first_name" class="form-control mb-2" placeholder="Ім'я" required>
                <input name="last_name" class="form-control mb-2" placeholder="Прізвище" required>
                <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
                <input type="password" name="password" class="form-control mb-4" placeholder="Пароль" required>
                <button class="btn btn-primary w-100" style="background:#6f42c1">Створити акаунт</button>
            </form>
            <hr>
            <a href="/login" class="small">Вже є акаунт? Увійти</a>
        </div>
    </div>
</body>
</html>
